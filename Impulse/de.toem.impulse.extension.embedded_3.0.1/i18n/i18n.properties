instancer.description = Adds a new  Serial Line Adapter. The Serial Port Adapter configures and opens a serial port and reads its raw data. The raw data is then processed by a configurable reader. 
instancer.label = Serial Line Adapter
instancer.description.0 = Adds a new SystemView Configuration. SEGGER's SystemView environment is a real-time recording and visualization tool that visualizes the runtime behavior of embedded applications. With the SystemView Reader, you can use impulse to read and analyse SystemView recording data from files or directly from running targets.
instancer.label.0 = SystemView Configuration
instancer.description.1 = Adds a new  J-Link Adapter. J-Link is a USB debug probe supporting a large number of CPU cores.The J-Link adapter provides RTT and SWO data via TCP sockets and tool interface.The raw data is then processed by a configurable reader (e.g SWV or SystemView reader). 
instancer.label.1 = J-Link Adapter
instancer.description.2 = Adds a new SWV Configuration. The Serial Wire Viewer from ARM (Cortex-M microcontroller) provides non-intrusive real-time tracing (ITM). Usually this mechanism is used for printfs only. The impulse SWV Reader enhances SWV use-cases as it allows to log and trace different kind of data (real, integer, strings, logic) to be stored, visualized and analysed with impulse.
instancer.label.2 = SWV Configuration

