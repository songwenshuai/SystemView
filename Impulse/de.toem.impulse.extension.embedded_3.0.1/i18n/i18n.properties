# ========================================================================================================================
# General
# ========================================================================================================================

group.label.embedded = EMBEDDED
group.description.embedded = EMBEDDEDEmbedded system complexity is constantly growing and high-level languages like java take more and more space in this area.\n Impulse can help developers to improve visibility of what is going on inside. This extension contains a serial line (RS232) adapter, a J-Link adapter,\n a CDT memory adapter, a Serial Wire Viewer (SWV) reader, a SystemView reader and a binary log format reader from the ukos project.
# ========================================================================================================================
# Serializer
# ========================================================================================================================

serializer.label.swv = Serial Wire Viewer
serializer.description.swv = The Serial Wire Viewer from ARM (Cortex-M microcontroller) provides non-intrusive real-time tracing (ITM). Usually this mechanism is used for printfs only. The impulse SWV Reader enhances SWV use-cases as it allows to log and trace different kind of data (real, integer, strings, logic) to be stored, visualized and analysed with impulse.

serializer.label.svdat = SystemView (SVDAT)
serializer.description.svdat = SEGGER's SystemView environment is a real-time recording and visualization tool that visualizes the runtime behavior of embedded applications. With the SystemView Reader, you can use impulse to read and analyse SystemView recording data from files or directly from running targets.

serializer.label.imp = UKos Binary Log (IMP)
serializer.description.imp = This format is used to trace the uKos kernel (ukos.org).

