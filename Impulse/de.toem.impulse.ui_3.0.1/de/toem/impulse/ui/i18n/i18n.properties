ChartsPage_Comments= The chart preference page enables the user to define new charts.\nThe basis for each new chart is a so called chart provider.\nimpulse contains providers for Birt charts, Nebula charts and script charts.\nUsers may extend impulse with additional chart providers.

FormatsPage_Comments=The format preference page lets you enter custom decimal formats as well as preferred domain units.\nYou can define up to eight different decimal formats. 
FormatsPage_DecimalUserFormats=User defined decimal formats
FormatsPage_EG=e.g. us,s,Hz
FormatsPage_PreferredDomainUnits_:Preferred domain units:

LicensePage_Comments= The license preference page allows you to manage your license keys.\nIf you've received a license key, you can enter this key in the field "User key".\nNon-commercial user may request a free Base or Analyse license key.\nCommercial user may request a free Essentials license key,\na 90 day test license or may request a quote for a commercial license.

ImpulsePage_Comments= Below you find preferences pages for the different aspects of impulse (views ,serializers, ports, templates, ...).\nPreferences can be easily exchanged (exported and imported) using the preference wallet editor.
ImpulsePage_ToImportExportPreferences=To import/ export preferences,\n create an impulse preference wallet and open the wallet editor!
ImpulsePage_ImportExport=Preference exchange (import/export)
ImpulsePage_CreateNewWallet=Create a new preference wallet

NativeExtensionsPage_Comments=impulse requires native extensions for\nvarious serializer and ports (e.g. c source, dlls / shared libraries, libs, ...).\nThe preference pages below allow the user to re-configure and to re-compile\nthese extensions for the actual operating system and platform.\nYou may:\n * Set pathes for tools, include files and libraries\n * Add additional compile and link flags\n * Clean and re-compile\n * Modify the Makefile\n * Modify the source code of the extension adapter

PortsPage_Comments=Ports are means to read signal data from external devices and interfaces.\nSimilar to charts, you can configure multiple ports of a given set of providers\n(e.g. add two tcp ports, one for port 4000, the other for port 4101). 
PortsPageShow_ImpulseSignalPorts=Show impulse Signal Ports view

SearchPage_Comments=If you press Ctrl-F in the impulse viewer, the Find dialogue opens (like in any other text editor).\nWith this dialogue you can search for signal patterns. 

SerializersPage_Comments=A serializer is a software extension to read or write signal data from or into a file.\nUsers can extend impulse with additional serializers (e.g to read a custom format). 

TemplatesPage_Comments=Templates simplify the re-use of configuration elements. A template may contain simple defaults,\nsuch that all float signals shall be painted red, but they can also contain a rich set of elements\ncontaining multiple scripts and folders.

ThemePage_Comments=This page shows all available themes. To select a theme, click the button to the right of each image. 
ThemePage_ForDetailedThemeSettings=For detailed theme settings, go to 'General->Appearance->Colors and Fonts'

ViewsPage_Comments=Manages all the view configurations. You can see all available views on the left side of this preferences editor.\nFurthermore, you can delete, copy, edit, change their place within the list to find them\nmore easily and you can enable and disable views.

PartsPage_Comments=Manage the settings for all impulse parts like sample or ports view.

