aboutText=impulse is a comfortable and powerful waveform viewer and analyzer tool, helping engineers to understand and debug complex semiconductor and multi-core software systems.\n\
It allows the representation of a wide range of signals, not limited to digital and analogue signals only.\n\
Beside these two, impulse offers transaction, event, text,log , structured, binary, image, and multi-dimensional signals supporting impressive visualization options.\n\
All impulse components are fully integrated into the eclipse framework (Windows, Linux and OsX/Mac) and can be combined with a growing set of emerging eclipse technologies and extensions (IoT, language IDEs, Reports, CM, ...).\n\
