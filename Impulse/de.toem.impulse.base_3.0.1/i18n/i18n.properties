serializer.label.vcd = Value Change Dump (VCD)
serializer.description.vcd = Value Change Dump (VCD)is an ASCII-based format for dumpfiles generated by EDA logic simulation tools. The reader additonally supports the vcd string extension.
serializer.label.flux = flux Trace (recTr)
serializer.description.flux = rflux trace format is an open waveform/trace format targeting semiconductor and multi-core embedded system use-cases. The trace data is packed into a binary format and allows scalable compression.
serializer.label.recjs = Signal Script (recJs)
serializer.description.recjs = RecJs files are wave files based on scripts. You can create signal references, define test vectors for your design, or script a custom reader. Everything is based on the same simple API used in signal scripts and serializers.
serializer.label.scripted = Scripted Reader
serializer.description.scripted = If you want to read signal and trace data from If you are reading signal and trace data from a TCP, file, serial or other port input and with a format unknown to the impulse, you can get on the right track with a scripted reader. 
serializer.label.merge = Merge Reader
serializer.description.merge = Merges multiple inputs.
serializer.label.diff = Diff Reader
serializer.description.diff = Compares 2 inputs.
serializer.label.line = Test Line Reader
serializer.description.line = Line reader for debugging purpose.
serializer.label.bytes = Test Byte Block Reader
serializer.description.bytes = Binary reader for debugging purpose.

