instancer.label.multiAdapterPort = Multi Adapter Port
instancer.description.multiAdapterPort = Adds a new multi adapter port. The "Multi Adapter Port" and its derivatives "Multi Resource Port" and "Multi File/Pipe Port" combine multiple adapters into one port. You can present and analyse signals from multiple inputs inside of one view.
instancer.label.multiPipePort = Multi File-Pipe Port
instancer.description.multiPipePort = Adds a new Multi File/Pipe Port.T he Multi File/Pipe Port allows to combine multiple File/Pipe adapters. A common filesystem root can be defined and used as base in all adapters.
instancer.label.pipe = File-Pipe Adapter
instancer.description.pipe = Adds a new File/Pipe adapter. The File/Pipe adapter uses a filesystem resource as input stream. The adapter can be combined with other adapters using a multi adapter port. The user must select serializer and configuration. 
instancer.label.socket = TCP Adapter
instancer.description.socket = Adds a new TCP adapter. The TCP adapter (Transmission Control Protocol) acts as a TCP client. The received data is forwarded to a configurable reader. Scripts are used to send data to the TCP server and activate the streaming environment (stimulation). The adapter can be combined with other adapters using a multi-adapter port.
instancer.label.udp = UDP Adapter
instancer.description.udp = Adds a new UDP adapter. The UDP adapter (User Datagram Protocol) acts as a UDP client. The received data is forwarded to a configurable reader. Scripts are used to send datagrams and activate the streaming environment (stimulation). The adapter can be combined with other adapters using a multi-adapter port.
instancer.label.process = Process Adapter
instancer.description.process = Adds a new process adapter. The Process adapter starts a process and reads its output (stdout). The received data is forwarded to a configurable reader. Scripts are used to send data to the process (stdin) and activate the streaming environment (stimulation). The adapter can be combined with other adapters using a multi-adapter port. 


