# ========================================================================================================================
# Producer
# ========================================================================================================================

producer.label.signalScript = Signal Script
producer.description.signalScript = Signal scripts allow the users to analyse and interpret signals in many ways. Combine signals using mathematical operations, generate references, implement protocol parsers, extract statistical informations or search for conflicts automatically.
producer.label.logicCombiner = Logic Combine
producer.description.logicCombiner = Combines multiple logic (1-dimensional or vectors) signals into one logic vector containing all bits.
producer.label.logicExtract = Logic Extract
producer.description.logicExtract = Logic Extract lets you extract ,swap and invert bits.
producer.label.memberExtract = Member Extract
producer.description.memberExtract = Extract a member, identified by the member name or index and creates a new signal of a given signal type.
producer.label.expressionFilter = Expression Filter
producer.description.expressionFilter = Filters all samples that don't match a given expression.\n1) Filter samples using a text fragment\n  abc: Show sample if text contains 'abc'\n2) Filter samples using a regular expression - Indicate with any of: '[](){}|?*^$\.'\n  ab[0-9]n? : ... if text contains 'abc0n', ....\n3) Filter samples using a numeric expression\n  0.4 < 2.0: Show sample if value matches range - use float or integer numbers (e.g. 0.1; 12 ; 0x300)\n  < 0x400: ... if value less than argument\n  <= -4: ... if value less or equal than argument\n  > 2.7: ... if value greater than argument\n  >= 0.04: ... if value greater or equal than argument\n  == 1000: ... if value equals argument
producer.label.textExtractor = Value Extract
producer.description.textExtractor = This production does 2 steps: Filters all non relevant samples and extract textual information from the relevant ones. Ths information will be converted into a given output signal type.
producer.label.arrayCombiner = Array Combine
producer.description.arrayCombiner = The Array Combine production combines multiple signals into one array.
producer.label.diff = Diff
producer.description.diff = Creates a "diff" signal from 2 input signals. The diff signal is identical with the input if both input are equal. Regions with non equal signal data are tagged.  
producer.label.delta = Delta
producer.description.delta = The Delta production creates a mathematical delta of the 2 input signals.


